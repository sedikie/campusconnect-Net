<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — CampusConnect</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="nav">
    <a href="/index.html" class="brand" style="color:#fff;"><span class="pin-dot"></span> CampusConnect</a>
    <div class="nav-links" id="nav-auth"></div>
  </nav>

  <section class="auth-page">
    <div class="wrap-narrow">
      <div class="auth-card">
        <h1>Welcome back</h1>
        <p class="sub">Log in to see what your groups have been discussing.</p>

        <div class="alert error" id="error-box"></div>

        <form id="login-form">
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required />
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submit-btn">Log in</button>
          </div>
        </form>

        <p class="auth-switch">New to CampusConnect? <a href="/signup.html">Create an account</a></p>
      </div>
    </div>
  </section>

  <script src="/js/main.js"></script>
  <script>
    const form = document.getElementById("login-form");
    const errorBox = document.getElementById("error-box");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";
      submitBtn.disabled = true;
      submitBtn.textContent = "Logging in…";

      try {
        await api("/auth/login", {
          method: "POST",
          body: { email: form.email.value.trim(), password: form.password.value },
        });
        window.location.href = "/dashboard.html";
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = "block";
        submitBtn.disabled = false;
        submitBtn.textContent = "Log in";
      }
    });
  </script>
</body>
</html>
